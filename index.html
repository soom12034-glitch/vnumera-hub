<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vNumera — Digital Accounting Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <span class="v-letter">V</span><span class="numera-text">Numera</span>
    </div>
    <div class="nav-links">
      <a href="#apps">البرامج</a>
      <a href="#about">من نحن</a>
      <a href="#contact">تواصل</a>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="v-letter hero-v">V</span><span class="numera-text">Numera</span>
      </h1>
      <p class="hero-subtitle" id="siteTagline">حلول محاسبية رقمية متكاملة</p>
      <a href="#apps" class="hero-cta">استكشف البرامج</a>
    </div>
    <div class="hero-glow"></div>
  </header>

  <section id="apps" class="apps-section">
    <div class="container">
      <h2 class="section-title">برامجنا</h2>
      <div class="apps-grid" id="appsGrid">
        <!-- Apps loaded dynamically from config -->
      </div>
    </div>
  </section>

  <section id="ads" class="ads-section">
    <div class="container">
      <div class="ads-container" id="adsContainer">
        <!-- Ads loaded dynamically -->
      </div>
    </div>
  </section>

  <section id="about" class="about-section">
    <div class="container">
      <h2 class="section-title">من نحن</h2>
      <p class="about-text" id="aboutText">
        نحن فريق متخصص في تطوير البرمجيات المحاسبية والإدارية. نقدم حلولاً رقمية متكاملة 
        تساعد الشركات والأفراد على إدارة أعمالهم بكفاءة واحترافية.
      </p>
    </div>
  </section>

  <footer class="footer" id="contact">
    <div class="container">
      <div class="footer-brand">
        <span class="v-letter">V</span><span class="numera-text">Numera</span>
      </div>
      <p class="footer-text" id="footerText">جميع الحقوق محفوظة © 2026</p>
      <div class="social-links" id="socialLinks">
        <a href="#" class="social-link">تويتر</a>
        <a href="#" class="social-link">واتساب</a>
        <a href="#" class="social-link">تيليجرام</a>
      </div>
    </div>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
